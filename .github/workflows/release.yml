name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check if release needed
        id: check
        run: |
          # Skip if the last commit was a version bump (prevent infinite loop)
          LAST_MSG=$(git log -1 --pretty=%s)
          if [[ "$LAST_MSG" == chore:\ bump* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version and tag
        id: bump
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version patch -m "chore: bump v%s")
          echo "version=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git push
          git push --tags

  build:
    needs: version
    if: needs.version.outputs.version != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
            targets: dmg zip
          - os: macos-latest
            platform: mac
            arch: x64
            targets: dmg zip
          - os: windows-latest
            platform: win
            arch: x64
            targets: nsis zip
          - os: ubuntu-latest
            platform: linux
            arch: x64
            targets: AppImage deb

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python setuptools (for node-gyp)
        run: pip3 install --break-system-packages setuptools
        if: runner.os == 'macOS'

      - name: Install Python setuptools (Linux)
        run: pip3 install setuptools
        if: runner.os == 'Linux'

      - name: Install Python setuptools (Windows)
        run: pip install setuptools
        if: runner.os == 'Windows'

      - name: Install dependencies
        run: npm install

      - name: Install client dependencies
        run: cd client && npm install

      - name: Build client
        run: npm run build:client

      - name: Build electron
        run: npm run build:electron

      - name: Build Electron app
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.targets }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml
