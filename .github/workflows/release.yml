name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine next version and tag
        id: bump
        run: |
          # Get latest version from git tags (source of truth)
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LATEST_TAG#v}"
          fi

          # Bump patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          TAG="v${NEXT}"

          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Create a lightweight tag — no commit to main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  build:
    needs: version
    if: needs.version.outputs.version != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
            targets: dmg zip
          - os: macos-latest
            platform: mac
            arch: x64
            targets: dmg zip
          - os: windows-latest
            platform: win
            arch: x64
            targets: nsis zip
          - os: ubuntu-latest
            platform: linux
            arch: x64
            targets: AppImage deb

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python setuptools (for node-gyp)
        run: pip3 install --break-system-packages setuptools
        if: runner.os == 'macOS'

      - name: Install Python setuptools (Linux)
        run: pip3 install setuptools
        if: runner.os == 'Linux'

      - name: Install Python setuptools (Windows)
        run: pip install setuptools
        if: runner.os == 'Windows'

      - name: Set version from tag
        run: npm version ${{ needs.version.outputs.version }} --no-git-tag-version

      - name: Install dependencies
        run: npm install

      - name: Install client dependencies
        run: cd client && npm install

      - name: Build client
        run: npm run build:client

      - name: Build electron
        run: npm run build:electron

      - name: Build Electron app
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.targets }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml

  publish:
    needs: [version, build]
    if: needs.version.outputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Merge artifacts and build latest-mac.yml
        run: |
          VERSION="${{ needs.version.outputs.version }}"

          # Collect all files into a flat release dir
          mkdir -p release
          find artifacts -type f | while read f; do
            cp "$f" "release/$(basename "$f")"
          done

          # Helper: sha512 in base64 (format electron-updater expects)
          sha512b64() { sha512sum "$1" | awk '{print $1}' | xxd -r -p | base64 -w0; }

          ARM64_ZIP_SHA=$(sha512b64 release/OpenUI-${VERSION}-arm64.zip)
          ARM64_ZIP_SIZE=$(stat -c%s release/OpenUI-${VERSION}-arm64.zip)
          ARM64_DMG_SHA=$(sha512b64 release/OpenUI-${VERSION}-arm64.dmg)
          ARM64_DMG_SIZE=$(stat -c%s release/OpenUI-${VERSION}-arm64.dmg)
          X64_ZIP_SHA=$(sha512b64 release/OpenUI-${VERSION}-x64.zip)
          X64_ZIP_SIZE=$(stat -c%s release/OpenUI-${VERSION}-x64.zip)
          X64_DMG_SHA=$(sha512b64 release/OpenUI-${VERSION}-x64.dmg)
          X64_DMG_SIZE=$(stat -c%s release/OpenUI-${VERSION}-x64.dmg)

          cat > release/latest-mac.yml << EOF
          version: ${VERSION}
          files:
            - url: OpenUI-${VERSION}-arm64.zip
              sha512: ${ARM64_ZIP_SHA}
              size: ${ARM64_ZIP_SIZE}
            - url: OpenUI-${VERSION}-arm64.dmg
              sha512: ${ARM64_DMG_SHA}
              size: ${ARM64_DMG_SIZE}
            - url: OpenUI-${VERSION}-x64.zip
              sha512: ${X64_ZIP_SHA}
              size: ${X64_ZIP_SIZE}
            - url: OpenUI-${VERSION}-x64.dmg
              sha512: ${X64_DMG_SHA}
              size: ${X64_DMG_SIZE}
          path: OpenUI-${VERSION}-arm64.zip
          sha512: ${ARM64_ZIP_SHA}
          releaseDate: '$(date -u +%Y-%m-%dT%H:%M:%S.000Z)'
          EOF

          sed -i 's/^          //' release/latest-mac.yml

          echo "=== Merged latest-mac.yml ==="
          cat release/latest-mac.yml

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml

  update-homebrew:
    needs: [version, publish]
    if: needs.version.outputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          # Get SHA256 of arm64 DMG
          ARM64_URL="https://github.com/mahitoburrito/openui-desktop/releases/download/v${VERSION}/OpenUI-${VERSION}-arm64.dmg"
          ARM64_SHA=$(curl -sL "$ARM64_URL" | sha256sum | awk '{print $1}')

          # Get SHA256 of x64 DMG
          X64_URL="https://github.com/mahitoburrito/openui-desktop/releases/download/v${VERSION}/OpenUI-${VERSION}-x64.dmg"
          X64_SHA=$(curl -sL "$X64_URL" | sha256sum | awk '{print $1}')

          # Clone the tap repo
          git clone https://x-access-token:${GH_TOKEN}@github.com/mahitoburrito/homebrew-tap.git
          cd homebrew-tap

          # Write updated cask
          cat > Casks/openui-desktop.rb << CASK
          cask "openui-desktop" do
            arch arm: "arm64", intel: "x64"
            version "${VERSION}"

            if Hardware::CPU.arm?
              url "https://github.com/mahitoburrito/openui-desktop/releases/download/v#{version}/OpenUI-#{version}-arm64.dmg"
              sha256 "${ARM64_SHA}"
            else
              url "https://github.com/mahitoburrito/openui-desktop/releases/download/v#{version}/OpenUI-#{version}-x64.dmg"
              sha256 "${X64_SHA}"
            end

            name "OpenUI Desktop"
            desc "AI Agent Command Center — manage multiple coding agents on an infinite canvas"
            homepage "https://github.com/mahitoburrito/openui-desktop"

            app "OpenUI.app"

            zap trash: [
              "~/.openui-desktop",
            ]
          end
          CASK

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Casks/openui-desktop.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/openui-desktop.rb
          git commit -m "Update openui-desktop to v${VERSION}" || true
          git push
