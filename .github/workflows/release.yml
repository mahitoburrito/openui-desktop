name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
            targets: dmg zip
          - os: macos-latest
            platform: mac
            arch: x64
            targets: dmg zip
          - os: windows-latest
            platform: win
            arch: x64
            targets: nsis zip
          - os: ubuntu-latest
            platform: linux
            arch: x64
            targets: AppImage deb

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python setuptools (for node-gyp)
        run: pip3 install --break-system-packages setuptools
        if: runner.os == 'macOS'

      - name: Install Python setuptools (Linux)
        run: pip3 install setuptools
        if: runner.os == 'Linux'

      - name: Install Python setuptools (Windows)
        run: pip install setuptools
        if: runner.os == 'Windows'

      - name: Install dependencies
        run: npm install

      - name: Install client dependencies
        run: cd client && npm install

      - name: Build client
        run: npm run build:client

      - name: Build electron
        run: npm run build:electron

      - name: Build Electron app
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.targets }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml
