name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check if release needed
        id: check
        run: |
          # Skip if the last commit was a version bump (prevent infinite loop)
          LAST_MSG=$(git log -1 --pretty=%s)
          if [[ "$LAST_MSG" == chore:\ bump* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version and tag
        id: bump
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version patch -m "chore: bump v%s")
          echo "version=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git push
          git push --tags

  build:
    needs: version
    if: needs.version.outputs.version != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
            targets: dmg zip
          - os: macos-latest
            platform: mac
            arch: x64
            targets: dmg zip
          - os: windows-latest
            platform: win
            arch: x64
            targets: nsis zip
          - os: ubuntu-latest
            platform: linux
            arch: x64
            targets: AppImage deb

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python setuptools (for node-gyp)
        run: pip3 install --break-system-packages setuptools
        if: runner.os == 'macOS'

      - name: Install Python setuptools (Linux)
        run: pip3 install setuptools
        if: runner.os == 'Linux'

      - name: Install Python setuptools (Windows)
        run: pip install setuptools
        if: runner.os == 'Windows'

      - name: Install dependencies
        run: npm install

      - name: Install client dependencies
        run: cd client && npm install

      - name: Build client
        run: npm run build:client

      - name: Build electron
        run: npm run build:electron

      - name: Build Electron app
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.targets }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/latest*.yml

  update-homebrew:
    needs: [version, build]
    if: needs.version.outputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          # Get SHA256 of arm64 DMG
          ARM64_URL="https://github.com/mahitoburrito/openui-desktop/releases/download/v${VERSION}/OpenUI-${VERSION}-arm64.dmg"
          ARM64_SHA=$(curl -sL "$ARM64_URL" | sha256sum | awk '{print $1}')

          # Get SHA256 of x64 DMG
          X64_URL="https://github.com/mahitoburrito/openui-desktop/releases/download/v${VERSION}/OpenUI-${VERSION}.dmg"
          X64_SHA=$(curl -sL "$X64_URL" | sha256sum | awk '{print $1}')

          # Clone the tap repo
          git clone https://x-access-token:${GH_TOKEN}@github.com/mahitoburrito/homebrew-tap.git
          cd homebrew-tap

          # Write updated cask
          cat > Casks/openui-desktop.rb << CASK
          cask "openui-desktop" do
            arch arm: "arm64", intel: "x64"
            version "${VERSION}"

            if Hardware::CPU.arm?
              url "https://github.com/mahitoburrito/openui-desktop/releases/download/v#{version}/OpenUI-#{version}-arm64.dmg"
              sha256 "${ARM64_SHA}"
            else
              url "https://github.com/mahitoburrito/openui-desktop/releases/download/v#{version}/OpenUI-#{version}.dmg"
              sha256 "${X64_SHA}"
            end

            name "OpenUI Desktop"
            desc "AI Agent Command Center — manage multiple coding agents on an infinite canvas"
            homepage "https://github.com/mahitoburrito/openui-desktop"

            app "OpenUI.app"

            zap trash: [
              "~/.openui-desktop",
            ]
          end
          CASK

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Casks/openui-desktop.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/openui-desktop.rb
          git commit -m "Update openui-desktop to v${VERSION}" || true
          git push
